apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: eventpulse
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/Yashika-tech/eventpulse.git
    targetRevision: main
    path: helm/eventpulse        # Path to the Helm chart in your repo

  destination:
    server: https://kubernetes.default.svc
    namespace: eventpulse        # K8s namespace to deploy to

  syncPolicy:
    automated:
      prune: true                # Remove deleted resources
      selfHeal: true             # Auto-fix manual changes
    syncOptions:
      - CreateNamespace=true     # Auto-create namespace if missing
